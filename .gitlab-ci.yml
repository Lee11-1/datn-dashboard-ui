######################## DEPLOY ####################

##
production:
  stage: production
  image: ${ECR_HIT_REPO}/helm:v3.13.0
  variables:
    NAMESPACE: meetsvn-core
    PROJECT: core-dashboard-frontend
    CONTAINER_NAME: core-dashboard-frontend
  script:
    - *deploy
  needs:
    - job: build_for_releases
  rules:
    - if: '$CI_COMMIT_TAG'
      when: on_success
  tags:
    - hit
    - ota
    - prod
